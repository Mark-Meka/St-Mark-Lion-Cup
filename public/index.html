<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="St Mark Lions Cup — Soccer League Standings, Match Results & Management" />
  <title>St Mark Lions Cup</title>
  <link rel="icon" href="/logo.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <img src="/logo.png" alt="Lions Cup Logo" class="brand-logo" />
        <div>
          <h1 class="brand-title">St Mark Lions Cup</h1>
          <p class="brand-subtitle">Church Soccer League</p>
        </div>
      </div>
      <nav class="header-nav">
        <a href="#standings" class="nav-link active" data-section="standings">Standings</a>
        <a href="#matches" class="nav-link" data-section="matches">Matches</a>
        <a href="#add-match" class="nav-link" data-section="add-match">+ Add Result</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <!-- ── Standings ──────────────────────────────────────── -->
    <section id="standings" class="section">
      <div class="section-header">
        <h2 class="section-title">
          <span class="icon">🏆</span> League Standings
        </h2>
      </div>
      <div class="card table-card">
        <div class="table-wrap">
          <table id="standings-table">
            <thead>
              <tr>
                <th class="col-pos">#</th>
                <th class="col-team">Team</th>
                <th class="col-num">MP</th>
                <th class="col-num">W</th>
                <th class="col-num">D</th>
                <th class="col-num">L</th>
                <th class="col-num">GF</th>
                <th class="col-num">GA</th>
                <th class="col-num">GD</th>
                <th class="col-pts">Pts</th>
              </tr>
            </thead>
            <tbody id="standings-body">
              <!-- Rendered by JS -->
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- ── Add Match ─────────────────────────────────────── -->
    <section id="add-match" class="section">
      <div class="section-header">
        <h2 class="section-title">
          <span class="icon">⚽</span> Add Match Result
        </h2>
      </div>
      <div class="card form-card">
        <form id="match-form" autocomplete="off">
          <div class="form-matchup">
            <!-- Home -->
            <div class="form-team-col">
              <label for="home-team">Home Team</label>
              <select id="home-team" required>
                <option value="">Select team…</option>
              </select>
              <label for="home-goals" class="sr-only">Home Goals</label>
              <input id="home-goals" type="number" min="0" max="99" placeholder="0" required />
            </div>

            <div class="form-vs">VS</div>

            <!-- Away -->
            <div class="form-team-col">
              <label for="away-team">Away Team</label>
              <select id="away-team" required>
                <option value="">Select team…</option>
              </select>
              <label for="away-goals" class="sr-only">Away Goals</label>
              <input id="away-goals" type="number" min="0" max="99" placeholder="0" required />
            </div>
          </div>

          <button type="submit" id="submit-btn" class="btn-primary">
            <span class="btn-text">Submit Result</span>
            <span class="btn-loader hidden"></span>
          </button>
        </form>
      </div>
    </section>

    <!-- ── Recent Matches ────────────────────────────────── -->
    <section id="matches" class="section">
      <div class="section-header">
        <h2 class="section-title">
          <span class="icon">📋</span> Recent Matches
        </h2>
      </div>
      <div id="matches-list" class="matches-list">
        <!-- Rendered by JS -->
      </div>
      <p id="no-matches" class="empty-state hidden">No matches have been played yet.</p>
    </section>
  </main>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <footer class="site-footer">
    <p>St Mark Lions Cup &copy; 2026 — All glory to God</p>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
